name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint (our code only)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      # ---- Syntax check (only our code) ----
      - name: Python syntax check (compileall)
        run: |
          python -m compileall -q mppw_web || true
          if [ -d "containers/mppw-llm-tokenizer" ]; then
            python -m compileall -q containers/mppw-llm-tokenizer
          fi

      # ---- Lint only what we own ----
      - name: Ruff lint (only our code)
        run: |
          set -e
          paths="mppw_web"
          if [ -d "containers/mppw-llm-tokenizer" ]; then
            paths="$paths containers/mppw-llm-tokenizer"
          fi
          echo "Linting paths: $paths"
          ruff check $paths

  tests:
    name: Tests (Poetry, if GitLab key exists)
    runs-on: ubuntu-latest

    env:
      HAS_GITLAB_KEY: ${{ secrets.GITLAB_SSH_PRIVATE_KEY || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip tests if GitLab SSH key is missing
        if: env.HAS_GITLAB_KEY == ''
        run: |
          echo "GitLab SSH key not available — skipping tests."

      # ---- SSH setup ----
      - name: Add SSH key for GitLab
        if: env.HAS_GITLAB_KEY != ''
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.GITLAB_SSH_PRIVATE_KEY }}

      - name: Trust GitLab host key
        if: env.HAS_GITLAB_KEY != ''
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H gitlab.com >> ~/.ssh/known_hosts

      - name: Init submodules
        if: env.HAS_GITLAB_KEY != ''
        run: |
          git submodule update --init --recursive

      # ---- Python + Poetry ----
      - name: Set up Python
        if: env.HAS_GITLAB_KEY != ''
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        if: env.HAS_GITLAB_KEY != ''
        run: |
          python -m pip install --upgrade pip
          pip install "poetry>=1.6,<3.0"
          poetry --version

      - name: Install dependencies
        if: env.HAS_GITLAB_KEY != ''
        run: |
          poetry install

      - name: Run tests
        if: env.HAS_GITLAB_KEY != ''
        run: |
          poetry run pytest -q
